    <header>
        <h1>The Adventure of a Pitt Student</h1>
        <span>Interactive Map</span>
    </header>

    <div id="breadcrumb"></div>

    <div id="loc-meta">
        <div id="loc-title"></div>
        <div id="loc-desc"></div>
    </div>

    <div id="scene">
        <!-- ── PHOTO ──────────────────────────────────────
         When you have real photos, swap the placeholder
         div for an <img> tag like this:

         <img id="scene-photo"
              src="photos/quad.jpg"
              alt="Main Quad" />

         Make sure the image is ~820×480 px or larger.
    ─────────────────────────────────────────────────── -->
        <img id="scene-photo"
             src="map.jpg"
             alt="Cathedral of Learning" />
        <div id="scene-placeholder" style="display:none;">
            <div class="ph-icon" id="ph-icon"></div>
            <div class="ph-name" id="ph-name"></div>
            <div style="font-size:12px;opacity:0.5;">replace with photo</div>
        </div>
        <!-- SVG drawn by JS — viewBox matches your photo dims -->
        <svg id="hotspot-svg"
             viewBox="0 0 820 480"
             preserveAspectRatio="xMidYMid meet"
             role="img"
             aria-label="Campus location with clickable areas">
        </svg>

        <div id="nav-hint">hover to reveal · click to explore</div>
    </div>

    <div id="controls">
        <button class="btn" id="btn-back" onclick="goBack()" disabled>← Back</button>
        <button class="btn" id="btn-home" onclick="navigate('map')" disabled>Home</button>
        <button class="btn" id="btn-camera" onclick="captureScene()">📷 Capture</button>
        <div id="visit-count"></div>
    </div>

    <footer>Use mouse or tab to navigate hotspots</footer>

    <!-- ═══════════════════════════════════════════════════════════
         LOCATION DATA
         ═══════════════════════════════════════════════════════════
         Each location needs:
           id        — unique string key
           title     — display name
           desc      — short description shown below the title
           icon      — emoji shown in the placeholder (remove when using real photos)
           photo     — path to your photo file  e.g. "photos/quad.jpg"
                       set to null to show the placeholder instead
           hotspots  — array of clickable regions

         Each hotspot needs:
           id        — unique string (within this location)
           label     — text shown on hover
           dest      — id of the location this hotspot leads to
           shape     — "polygon" | "rect" | "ellipse"

           For polygon:
             points  — SVG points string  "x1,y1 x2,y2 x3,y3 ..."

           For rect:
             x, y, w, h  — position and size in viewBox units

           For ellipse:
             cx, cy      — centre point
             rx, ry      — x-radius and y-radius

         COORDINATE TIPS
         ───────────────
         The SVG viewBox is 820 × 480 (matching a typical landscape photo).
         To find coordinates for your own photos:
           1. Open the photo in any image editor that shows pixel coords.
           2. Hover over the corners/centre of the area you want clickable.
           3. Scale to 820 wide: new_x = pixel_x * (820 / original_width)
              Scale to 480 tall: new_y = pixel_y * (480 / original_height)
           OR use https://www.image-map.net — draw your areas, copy the
              coords, and convert <area> coords to SVG format.
    ═══════════════════════════════════════════════════════════ -->

            photo: "nearPhips.jpeg",
            hotspots: [
                {
                    id: "to-phi",
                    label: "Look at Phipps -->",
                    dest: "phip",
                    shape: "rect",
                    x: 700, y: 250, w: 100, h: 75
                },
                {
                    id: "to-ruins",
                    label: "Head to Ruins",
                    dest: "ruin",
                    shape: "rect",
                    x: 35, y: 200, w: 100, h: 75
                },
            ]
        },
        phip: {
            title: "Outside of Phipps Botanical Garden",
            desc: "The strange force pulls you along the path, until you're just outside of Phipps Botanical Garden. To your right is Phipps itself, but you notice a ruin-like structure up a distant hill...",
            icon: "",
            photo: "phipps.jpg",
            hotspots: [
                {
                    id: "look_back2",
                    label: "Look Away",
                    dest: "phipInter",
                    shape: "rect",
                    x: 75, y: 400, w: 100, h: 75
                },
            ]
        },
        ruin: {
            title: "The Ruins",
            desc: "You head up the hill towards the ruins, and find yourself in front of a large stone structure. It looks like it was once a grand building, but now it's just a shell of its former self. You feel a strange energy emanating from the ruins, and you can't help but feel drawn to it... It feels like freedom right in front of your face, but so far from your grasps...",
            icon: "",
            photo: "ruins.jpeg",
            hotspots: [
                {
                    id: "look_back3",
                    label: "Leave the Ruins",
                    dest: "phipInter",
                    shape: "rect",
                    x: 75, y: 400, w: 100, h: 75
                },
            ]
        },
        WIN: {
            title: "THE END",
            desc: "After getting LOCKED IN, Calculating (and even changing) your GPA, Acquiring the Ancient Luck, as well as the last dollar to your Tuition, you've beat college!",
            icon: "",
            photo: "winner.jpeg",
            hotspots:[]
        }

            /* ── LOCATION 5 ──────────────────────────────────── */

        };

        let history = [];
        let current = "map";    
        let visitedSet = new Set();

        const playerState = {
            inventory: []          // items collected so far
        };
        const REQUIRED_ITEMS = ["Ancient_Fortune", "Lock", "Dollar", "Calculator"];

        function hasItem(id) {
            return playerState.inventory.includes(id);
        }

        function canEscape() {
            return REQUIRED_ITEMS.every(id => hasItem(id));
        }
        function captureScene() {
            const photo = document.getElementById("scene-photo");

            const canvas = document.createElement("canvas");
            canvas.width = 820;
            canvas.height = 480;
            const ctx = canvas.getContext("2d");

            ctx.drawImage(photo, 0, 0, 820, 480);

            const link = document.createElement("a");
            link.download = `${current}-capture.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
        /* ── Render a location ─────────────────────────── */
        function renderScene(id) {
            const loc = LOCATIONS[id];
            if (!loc) { console.error("Unknown location:", id); return; }

            visitedSet.add(id);

            /* Meta text */
            document.getElementById("loc-title").textContent = loc.title;
            document.getElementById("loc-desc").textContent = loc.desc;
            document.getElementById("visit-count").textContent =
                `${visitedSet.size} / ${Object.keys(LOCATIONS).length} locations visited`;

            /* Breadcrumb */
            const trail = [...history, id].map((h, i, arr) => {
                const name = LOCATIONS[h]?.title ?? h;
                return i === arr.length - 1
                    ? `<span>${name}</span>`
                    : name;
            }).join(" › ");
            document.getElementById("breadcrumb").innerHTML = trail;

            /* Photo or placeholder */
            const placeholder = document.getElementById("scene-placeholder");
            let photo = document.getElementById("scene-photo");

            if (loc.photo) {
                if (!photo) {
                    photo = document.createElement("img");
                    photo.id = "scene-photo";
                    document.getElementById("scene").insertBefore(photo, document.getElementById("hotspot-svg"));
                }
                photo.src = loc.photo;
                photo.alt = loc.title;
                placeholder.style.display = "none";
                photo.style.display = "block";
            } else {
                if (photo) photo.style.display = "none";
                placeholder.style.display = "flex";
                document.getElementById("ph-icon").textContent = loc.icon;
                document.getElementById("ph-name").textContent = loc.title;
            }

            /* Buttons */
            document.getElementById("btn-back").disabled = history.length === 0;
            document.getElementById("btn-home").disabled = id === "map";

            /* Draw hotspots */
            if (canEscape() && id === "ruin") {
                const escapeHotspot = {
                    id: "to-escape",
                    label: "Something feels different...",
                    dest: "WIN",
                    shape: "ellipse",
                    cx: 410, cy: 220, rx: 130, ry: 35
                };
                drawHotspots([...loc.hotspots, escapeHotspot]);
            } else {
                drawHotspots(loc.hotspots);
            }

            /* Fade-in animation */
            const scene = document.getElementById("scene");
            scene.classList.remove("scene-enter");
            void scene.offsetWidth; // reflow
            scene.classList.add("scene-enter");
        }

        /* ── Draw SVG hotspots ─────────────────────────── */
        function drawHotspots(hotspots) {
            const svg = document.getElementById("hotspot-svg");
            svg.innerHTML = "";
            hotspots
                .filter(h => {
                    // hide pickup hotspots for items already in inventory
                    if (h.action === "pickup" && hasItem(h.item)) return false;
                    return true;
                })
                .forEach(h => {
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    g.setAttribute("class", "hotspot");
                    g.setAttribute("role", "button");
                    g.setAttribute("tabindex", "0");
                    g.setAttribute("aria-label", `Go to ${h.label}`);

                    /* ── Shape ── */
                    let shape;
                    if (h.shape === "polygon") {
                        shape = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                        shape.setAttribute("points", h.points);

                    } else if (h.shape === "rect") {
                        shape = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                        shape.setAttribute("x", h.x);
                        shape.setAttribute("y", h.y);
                        shape.setAttribute("width", h.w);
                        shape.setAttribute("height", h.h);
                        shape.setAttribute("rx", "8");

                    } else if (h.shape === "ellipse") {
                        shape = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                        shape.setAttribute("cx", h.cx);
                        shape.setAttribute("cy", h.cy);
                        shape.setAttribute("rx", h.rx);
                        shape.setAttribute("ry", h.ry);
                    }
                    shape.setAttribute("class", "hs-shape");

                    /* ── Centre point for label ── */
                    const cx = computeCx(h);
                    const cy = computeCy(h);

                    /* ── Label group ── */
                    const labelG = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    labelG.setAttribute("class", "hs-label");

                    const labelBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    labelBg.setAttribute("class", "hs-label-bg");
                    const textW = h.label.length * 7.5 + 24;
                    labelBg.setAttribute("x", cx - textW / 2);
                    labelBg.setAttribute("y", cy - 26);
                    labelBg.setAttribute("width", textW);
                    labelBg.setAttribute("height", 40);
                    labelBg.setAttribute("rx", "5");

                    const labelTxt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    labelTxt.setAttribute("class", "hs-label-text");
                    labelTxt.setAttribute("x", cx);
                    labelTxt.setAttribute("y", cy - 10);
                    labelTxt.textContent = h.label;

                    const arrowTxt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    arrowTxt.setAttribute("class", "hs-arrow");
                    arrowTxt.setAttribute("x", cx);
                    arrowTxt.setAttribute("y", cy + 8);
                    arrowTxt.textContent = "click to enter";

                    labelG.appendChild(labelBg);
                    labelG.appendChild(labelTxt);
                    labelG.appendChild(arrowTxt);

                    g.appendChild(shape);
                    g.appendChild(labelG);

                    /* ── Events ── */
                    g.addEventListener("click", () => {
                        if (h.action === "pickup") {
                            pickupItem(h);
                        } else {
                            navigate(h.dest);
                        }
                    });
                    g.addEventListener("keydown", e => {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            navigate(h.dest);
                        }
                    });

                    svg.appendChild(g);
                });
        }

        /* ── Navigation ────────────────────────────────── */
        function navigate(dest) {
            if (!LOCATIONS[dest]) {
                console.warn("No location defined for:", dest);
                return;
            }
            history.push(current);
            current = dest;
            renderScene(current);
        }
        function pickupItem(hotspot) {
            if (hasItem(hotspot.item)) return;

            playerState.inventory.push(hotspot.item);
            updateHUD();

            renderScene(current);
        }

        function goBack() {
            if (!history.length) return;
            current = history.pop();
            renderScene(current);
        }

        /* ── Helpers: find centroid of any hotspot ─────── */
        function computeCx(h) {
            if (h.shape === "ellipse") return h.cx;
            if (h.shape === "rect") return h.x + h.w / 2;
            // polygon — average x coords
            const xs = h.points.trim().split(/\s+/).map(p => parseFloat(p.split(",")[0]));
            return xs.reduce((a, b) => a + b, 0) / xs.length;
        }

        function computeCy(h) {
            if (h.shape === "ellipse") return h.cy;
            if (h.shape === "rect") return h.y + h.h / 2;
            const ys = h.points.trim().split(/\s+/).map(p => parseFloat(p.split(",")[1]));
            return ys.reduce((a, b) => a + b, 0) / ys.length;
        }
        function updateHUD() {
            const count = playerState.inventory.length;
            const total = REQUIRED_ITEMS.length;
            document.getElementById("visit-count").textContent =
                `Items: ${count} / ${total}  ·  ${visitedSet.size} locations visited`;
        }
        /* ── Boot ───────────────────────────────────────── */
        renderScene(current);
    </script>
</body>
